name: Docker Build

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests targeting main
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3  # Updated to v3 for consistency
        if: github.event_name != 'pull_request'  # Only login on push or manual trigger
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: |
            ghcr.io/arkhammknight/compar:latest
            ghcr.io/arkhammknight/compar:${{ github.sha }}
          cache-from: type=gha,scope=clear
          cache-to: type=gha,scope=clear,mode=max
          push: ${{ github.event_name != 'pull_request' }}  # Push only on push or manual trigger
